<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Offline Ontology Critic</title>
  <link rel="stylesheet" href="offline-ontology-critic.css">
</head>
<body>
  <main class="offline-ontology-critic">
    <h1>Offline Ontology Critic</h1>
    <p>Manual feedback harness for sending a completed final-response turn to the external OfflineCritic runner.</p>

    <form id="feedback-form" class="critic-card">
      <label>Source session key
        <input name="sourceSessionKey" required placeholder="Feeding Frenzy 6-1">
      </label>
      <label>Turn key
        <input name="turnKey" required placeholder="94cdde6f-d041-49b4-be91-553f5f6eca63">
      </label>
      <label>Feedback
        <select name="feedback">
          <option value="neutral">neutral</option>
          <option value="thumbs-up">thumbs-up</option>
          <option value="thumbs-down">thumbs-down</option>
        </select>
      </label>
      <fieldset>
        <legend>Chips</legend>
        <label><input type="checkbox" name="chips" value="remember how to do this"> remember how to do this</label>
        <label><input type="checkbox" name="chips" value="this was good"> this was good</label>
        <label><input type="checkbox" name="chips" value="this was bad"> this was bad</label>
        <label><input type="checkbox" name="chips" value="wrong path"> wrong path</label>
        <label><input type="checkbox" name="chips" value="make this reusable"> make this reusable</label>
        <label><input type="checkbox" name="chips" value="add ontology/action routing help"> add ontology/action routing help</label>
        <label><input type="checkbox" name="chips" value="reduce future token usage"> reduce future token usage</label>
      </fieldset>
      <label>Instruction
        <textarea name="instruction" rows="4" placeholder="What should the critic pay attention to?"></textarea>
      </label>
      <label>Final response text
        <textarea name="messageText" rows="6" placeholder="Optional final assistant response text to pass directly to the critic."></textarea>
      </label>
      <button type="submit">Run Offline Critic Feedback Review</button>
    </form>

    <pre id="feedback-result" class="critic-result" hidden></pre>
  </main>
  <script src="offline-ontology-critic.js"></script>
</body>
</html>
