<body>
	<main class="app-shell">
		<header class="hero-card">
			<div>
				<p class="eyebrow">Buffaly Agent Tools</p>
				<h1>Agent Targets</h1>
				<p class="hero-copy">Manage the local JsonWs base URLs used when CodeReviews loads sessions or sends review notes.</p>
			</div>
			<div class="hero-actions">
				<a class="button-link" href="shortcuts.html">Shortcuts</a>
				<a class="button-link" href="index.html">Repositories</a>

		<section class="page-card">
			<div class="page-header"><h2>Configured targets</h2><p class="subtle">Dev currently points at the Matt instance by default.</p></div>

				<button id="saveTargetsButton" type="button">Save target URLs</button>
			</div>
		</section>
		<section class="details-panel"><h2>Status</h2><pre id="statusLog">Ready.</pre></section>
